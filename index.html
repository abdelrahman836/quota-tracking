<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quota Tracker</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}

body{
background:#0b0f1a;
color:white;
padding:16px;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:#141b2d;
border-radius:16px;
padding:18px;
margin-bottom:14px;
}

.big{
font-size:40px;
font-weight:700;
}

.small{
opacity:.7;
font-size:13px;
}

.progress{
height:10px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
width:0%;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.day{
background:#111827;
border-radius:12px;
padding:12px;
text-align:center;
}

.day span{
display:block;
margin-top:4px;
font-weight:600;
}

.prediction{
margin-top:10px;
font-size:13px;
opacity:.8;
text-align:center;
}

/* hidden editor */

.editor{
margin-top:40px;
padding-top:20px;
border-top:1px solid #333;
display:none;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:8px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.delete{
background:#dc2626;
}

.unlock{
background:#f59e0b;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="small">Remaining</div>
<div class="big" id="remaining"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="small">Used: <span id="used"></span></div>

<div class="prediction" id="prediction"></div>

</div>

<div class="grid" id="days"></div>

<!-- hidden unlock -->
<button class="unlock" onclick="unlock()">Admin</button>

<!-- hidden editor panel -->
<div class="editor" id="editor">

<h3>Edit Usage</h3>

<input id="dayInput" placeholder="Day number">
<input id="usageInput" placeholder="Usage (GB)">

<button onclick="addOrUpdate()">Add / Update Day</button>

<input id="deleteDay" placeholder="Day to delete">
<button class="delete" onclick="deleteDay()">Delete Day</button>

</div>

</div>

<script>

/* ===== CONFIG ===== */

const totalQuota = 140;
const password = "1234";

/* ================== */

let entries = [
{day:1,usage:4.2},
{day:2,usage:3.8},
{day:3,usage:5.1}
];

/* render */

function render(){

entries.sort((a,b)=>a.day-b.day);

const used = entries.reduce((a,b)=>a+b.usage,0);

const remaining = totalQuota-used;

document.getElementById("remaining").innerText =
remaining.toFixed(1)+" GB";

document.getElementById("used").innerText =
used.toFixed(1)+" GB";

document.getElementById("bar").style.width =
(used/totalQuota*100)+"%";

const avg = used/entries.length;

const predicted = Math.round(entries.length + remaining/avg);

document.getElementById("prediction").innerText =
"Estimated exhaustion day: "+predicted;

const grid=document.getElementById("days");

grid.innerHTML="";

entries.forEach(e=>{

const div=document.createElement("div");

div.className="day";

div.innerHTML=`
Day ${e.day}
<span>${e.usage} GB</span>
`;

grid.appendChild(div);

});

}

/* unlock editor */

function unlock(){

let p = prompt("Password");

if(p===password){

document.getElementById("editor").style.display="block";

}

}

/* add or update */

function addOrUpdate(){

let day=parseInt(document.getElementById("dayInput").value);
let usage=parseFloat(document.getElementById("usageInput").value);

if(!day||!usage)return;

let existing=entries.find(e=>e.day===day);

if(existing){

existing.usage=usage;

}else{

entries.push({day,usage});

}

render();

}

/* delete */

function deleteDay(){

let d=parseInt(document.getElementById("deleteDay").value);

entries=entries.filter(e=>e.day!==d);

render();

}

render();

</script>

</body>
</html>
