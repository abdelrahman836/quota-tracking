<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quota Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto;}
body{background:linear-gradient(160deg,#0f172a,#020617);color:white;padding:20px;min-height:100vh;}
.container{max-width:520px;margin:auto;}
.card{
  background:rgba(255,255,255,.05);
  border-radius:22px;
  padding:24px;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  margin-bottom:20px;
}
.header{display:flex;align-items:center;gap:10px;font-size:14px;opacity:.8;margin-bottom:8px;}
.big{font-size:46px;font-weight:700;letter-spacing:-1px;}
.subheader{font-size:13px;opacity:.7;margin-top:4px;}
.progress{height:12px;background:rgba(255,255,255,.08);border-radius:30px;overflow:hidden;margin-top:14px;}
.bar{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);width:0%;}
.stats{margin-top:10px;font-size:14px;opacity:.8;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;}
.day{
  background:rgba(255,255,255,.06);
  border-radius:14px;
  padding:10px 8px;
  text-align:center;
  border:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:14px;
  min-height:80px;
}
.day svg{width:20px;height:20px;margin-bottom:4px;fill:#fff;opacity:.8;}
.day .label{font-size:12px;opacity:.7;}
.day .value{font-size:16px;font-weight:600;margin-top:2px;}
.prediction{margin-top:12px;font-size:13px;opacity:.7;text-align:center;}
</style>
</head>
<body>
<div class="container">

<div class="card">
<div class="header">
<svg width="20" height="20" fill="white" opacity=".8" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-.68.09-1.34.23-1.98L12 12l7.77-3.98c.14.64.23 1.3.23 1.98 0 4.41-3.59 8-8 8z"/></svg>
Remaining Quota
</div>

<div class="big" id="remaining"></div>
<div class="subheader" id="startDateDisplay"></div>

<div class="progress"><div class="bar" id="bar"></div></div>
<div class="stats">📊 Used: <span id="used"></span></div>
<div class="prediction" id="prediction"></div>
</div>

<div class="grid" id="days"></div>

</div>

<script>
// CONFIG
const totalQuota = 120;
const startDate = "2026-03-01"; // YYYY-MM-DD

// DATA
let entries = [
  {day:1,usage:4.2},
  {day:2,usage:5},
  {day:3,usage:8},
  {day:4,usage:7},
  {day:5,usage:5},
  {day:6,usage:2.2},
];

function getCurrentDay(){
  const start = new Date(startDate);
  const today = new Date();
  const diff = Math.floor((today - start)/(1000*60*60*24)) + 1;
  return diff > 0 ? diff : 1;
}

function render(){
  entries.sort((a,b)=>a.day-b.day);

  const used = entries.reduce((a,b)=>a+b.usage,0);
  const remaining = totalQuota - used;

  document.getElementById("remaining").innerText = remaining.toFixed(1)+" GB";

  // display start date
  const start = new Date(startDate);
  document.getElementById("startDateDisplay").innerText = "Quota Start: " + start.toLocaleDateString();

  document.getElementById("used").innerText = used.toFixed(1)+" GB";
  document.getElementById("bar").style.width = (used/totalQuota*100)+"%";

  const avg = used/entries.length;
  const predicted = Math.round(entries.length + remaining/avg);
  document.getElementById("prediction").innerText = "Estimated exhaustion day: "+predicted;

  const grid=document.getElementById("days");
  grid.innerHTML="";
  const currentDay = getCurrentDay();

  entries.forEach(e=>{
    if(e.day <= currentDay){
      const div = document.createElement("div");
      div.className = "day";
      div.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 18H5V10h14v12zM5 8V6h14v2H5z"/>
      </svg>
      <div class="label">Day ${e.day}</div>
      <div class="value">${e.usage} GB</div>`;
      grid.appendChild(div);
    }
  });
}

render();
saveData();
</script>
</body>
</html>
