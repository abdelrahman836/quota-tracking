<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quota Tracker</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}

body{
background:#0b0f1a;
color:white;
padding:16px;
}

.container{
max-width:520px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:16px;
}

.card{
background:#141b2d;
border-radius:16px;
padding:18px;
margin-bottom:14px;
}

.big{
font-size:40px;
font-weight:700;
}

.small{
opacity:.7;
font-size:13px;
}

.progress{
height:10px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
width:0%;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:12px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.day{
background:#111827;
border-radius:12px;
padding:12px;
text-align:center;
}

.day span{
display:block;
margin-top:4px;
font-weight:600;
}

button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

.unlock{
background:#f59e0b;
}

.prediction{
margin-top:10px;
font-size:13px;
opacity:.8;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Internet Quota</h2>
</div>

<div class="card">

<div class="small">Remaining</div>
<div class="big" id="remaining"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="stats">
<div>Used: <span id="used"></span></div>
</div>

<div class="prediction" id="prediction"></div>

</div>

<div class="grid" id="days"></div>

<button class="unlock" onclick="unlock()">Unlock Editing</button>
<button onclick="addEntry()">Add Day</button>

</div>

<script>

/* ===== CONFIG ===== */

const totalQuota = 140;
const editPassword = "1234";

/* ================== */

let unlocked = false;

let entries = [
{day:1,usage:4.2},
{day:2,usage:3.8},
{day:3,usage:5.1}
];

function unlock(){

let p = prompt("Enter edit password");

if(p === editPassword){

unlocked = true;
alert("Editing unlocked");

}else{

alert("Wrong password");

}

}

function render(){

const used = entries.reduce((a,b)=>a+b.usage,0);

const remaining = totalQuota-used;

document.getElementById("remaining").innerText =
remaining.toFixed(1)+" GB";

document.getElementById("used").innerText =
used.toFixed(1)+" GB";

const percent = used/totalQuota*100;

document.getElementById("bar").style.width =
percent+"%";

/* prediction */

const avg = used/entries.length;

const daysLeft = remaining/avg;

const predicted = Math.round(entries.length+daysLeft);

document.getElementById("prediction").innerText =
"Estimated exhaustion day: "+predicted;

/* render days */

const grid=document.getElementById("days");

grid.innerHTML="";

entries.forEach(e=>{

const div=document.createElement("div");

div.className="day";

div.innerHTML = `
Day ${e.day}
<span>${e.usage} GB</span>
`;

grid.appendChild(div);

});

}

function addEntry(){

if(!unlocked){

alert("Unlock editing first");

return;

}

let day = prompt("Day number");

if(day===null)return;

let usage = prompt("Usage in GB");

if(usage===null)return;

entries.push({
day:parseInt(day),
usage:parseFloat(usage)
});

render();

}

render();

</script>

</body>
</html>
